name: CI/CD Checks

on:
  pull_request:
    branches:
      - main

jobs:
  code-quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm ci

      - name: Check Code Formatting (Prettier)
        run: npx prettier --check "src/**/*.{js,jsx,css}"

      - name: Run Linter (ESLint)
        run: npm run lint

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm ci

      - name: Build Application
        run: npm run build
